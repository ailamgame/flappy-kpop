<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Flappy Kpop | AI Làm Game?</title>
    <link rel="icon" type="image/png" href="assets/flappy-idol.png" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="top-bar">
            <div class="stats-text" id="level-display">Level: 1</div>
            <div style="display:flex; gap:10px; align-items:center;">
                <div class="stats-text" id="star-display">⭐ 0</div>
                <button id="sound-toggle" title="Toggle sound" aria-label="toggle-sound">🔊 ON</button>
            </div>
        </div>

        <div id="score-board" class="hidden">0</div>
        <div id="effects-board"></div>

        <div id="start-screen" class="ui-layer">
            <div class="panel">
                <h1 id="start-title">Flappy Star</h1>
                <p id="start-desc">Fly through the pipes to clear the level!</p>
                <div id="start-info" style="font-size:12px; text-align:left; margin-bottom:15px; line-height:1.5;">
                    <!-- JS sẽ chèn nội dung mô tả -->
                </div>
                <div class="btn-container">
                    <button class="btn btn-blue" id="btn-shop-start">Shop</button>
                    <button class="btn" id="btn-start">Start</button>
                </div>

                <!-- language button under Shop & Start -->
                <div class="lang-row">
                    <button id="lang-toggle" aria-label="toggle-language">EN</button>
                </div>
            </div>
        </div>

        <!-- Shop: đã thêm Backgrounds + Skins -->
        <!-- <div id="shop-screen" class="ui-layer hidden">
            <div class="panel">
                <h1 id="shop-title">Skins & Backgrounds</h1>
                <p id="shop-desc">You have: <span id="shop-stars">0</span> ⭐</p>

                <div class="shop-section-title">Backgrounds</div>
                <div class="shop-items" id="bg-list"></div>

                <div class="shop-section-title">Skins</div>
                <div class="shop-items" id="shop-list"></div>

                <button class="btn" id="btn-close-shop" style="width:100%">Close</button>
            </div>
        </div> -->
        <div id="shop-screen" class="ui-layer hidden">
            <div class="panel">
                <h1 id="shop-title">Skins & Backgrounds</h1>
                <p id="shop-desc">You have: <span id="shop-stars">0</span> ⭐</p>

                <!-- Tabs -->
                <div class="shop-tabs">
                    <button class="tab-btn active" data-tab="skin-tab">Skins</button>
                    <button class="tab-btn" data-tab="bg-tab">Backgrounds</button>
                </div>

                <!-- Tab Contents -->
                <div class="tab-content active" id="skin-tab">
                    <div class="shop-items" id="shop-list"></div>
                </div>

                <div class="tab-content" id="bg-tab">
                    <div class="shop-items" id="bg-list"></div>
                </div>

                <button class="btn" id="btn-close-shop" style="width:100%">Close</button>
            </div>
        </div>

        <div id="game-over-screen" class="ui-layer hidden">
            <div class="panel">
                <h1 id="gameover-title">Game Over</h1>
                <div class="score-box">
                    <div id="score-label">Score: <br><b id="final-score" style="font-size:24px;">0</b></div>
                    <div id="best-label">Best: <br><b id="best-score" style="font-size:24px;">0</b></div>
                </div>
                <div class="btn-container">
                    <button class="btn btn-blue" id="btn-shop-over">Shop</button>
                    <button class="btn" id="btn-restart">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
